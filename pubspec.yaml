name: ondas_mobile
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Dependency injection
  get_it: ^8.0.3

  # Navigation
  go_router: ^17.2.1

  # HTTP client
  dio: ^5.8.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Image picker
  image_picker: ^1.1.2

  # Functional programming (Either/Option)
  fpdart: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # BLoC testing
  bloc_test: ^10.0.0

  # Mocking
  mocktail: ^1.0.4

flutter:

  uses-material-design: true
